<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" name="viewport">
  <title>Patient Registration | Hospital Management System</title>

  <!-- General CSS Files -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='bundles/jquery-selectric/selectric.css') }}">

  <!-- Template CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">

  <!-- Custom style CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
  <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
</head>

<body>
  <div class="loader"></div>
  <div id="app">
    <section class="section">
      <div class="container mt-5">
        <div class="row">
          <div class="col-12 col-sm-10 offset-sm-1 col-md-8 offset-md-2 col-lg-8 offset-lg-2 col-xl-8 offset-xl-2">
            <div class="card card-primary">
              <div class="card-header">
                <h4>Patient Registration</h4>
              </div>

              <div class="card-body">
                <!-- Flash messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                          <span aria-hidden="true">&times;</span>
                        </button>
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('auth.register') }}">
                  <div class="row">
                    <div class="form-group col-6">
                      <label for="first_name">First Name</label>
                      <input id="first_name" type="text" class="form-control" name="first_name" required autofocus>
                    </div>
                    <div class="form-group col-6">
                      <label for="last_name">Last Name</label>
                      <input id="last_name" type="text" class="form-control" name="last_name" required>
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" class="form-control" required>
                      <option value="">Select Gender</option>
                      <option value="Male">Male</option>
                      <option value="Female">Female</option>
                      <option value="Other">Other</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input id="dob" type="date" class="form-control" name="dob" required>
                  </div>

                  <div class="row">
                    <div class="form-group col-6">
                      <label for="email">Email</label>
                      <input id="email" type="email" class="form-control" name="email" required>
                    </div>
                    <div class="form-group col-6">
                      <label for="contact_no">Contact Number</label>
                      <input id="contact_no" type="text" class="form-control" name="contact_no" required>
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" class="form-control" name="address" rows="2" required></textarea>
                  </div>

                  <div class="row">
                    <div class="form-group col-4">
                      <label for="city">City</label>
                      <input id="city" type="text" class="form-control" name="city" required>
                    </div>
                    <div class="form-group col-4">
                      <label for="state">State</label>
                      <input id="state" type="text" class="form-control" name="state" required>
                    </div>
                    <div class="form-group col-4">
                      <label for="postal_code">Postal Code</label>
                      <input id="postal_code" type="text" class="form-control" name="postal_code" required>
                    </div>
                  </div>

                  <div class="row">
                    <div class="form-group col-6">
                      <label for="password">Password</label>
                      <input id="password" type="password" class="form-control" name="password" required>
                    </div>
                    <div class="form-group col-6">
                      <label for="confirm_password">Confirm Password</label>
                      <input id="confirm_password" type="password" class="form-control" name="confirm_password" required>
                    </div>
                  </div>

                  <div class="form-group">
                    <div class="custom-control custom-checkbox">
                      <input type="checkbox" name="agree" class="custom-control-input" id="agree" required>
                      <label class="custom-control-label" for="agree">
                        I agree to the terms and conditions
                      </label>
                    </div>
                  </div>

                  <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-lg btn-block">
                      Register
                    </button>
                  </div>
                </form>
              </div>

              <div class="mb-4 text-muted text-center">
                Already have an account? 
                <a href="{{ url_for('auth.login') }}">Login</a>
              </div>

            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- General JS Scripts -->
  <script src="{{ url_for('static', filename='js/app.min.js') }}"></script>

  <!-- JS Libraries -->
  <script src="{{ url_for('static', filename='bundles/jquery-pwstrength/jquery.pwstrength.min.js') }}"></script>
  <script src="{{ url_for('static', filename='bundles/jquery-selectric/jquery.selectric.min.js') }}"></script>

  <!-- Page Specific JS File -->
  <script src="{{ url_for('static', filename='js/page/auth-register.js') }}"></script>

  <!-- Template JS File -->
  <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>

  <!-- Custom JS File -->
  <script src="{{ url_for('static', filename='js/custom.js') }}"></script>
</body>
</html>
