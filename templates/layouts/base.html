<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title if title else 'Hospital Management System' }}</title>

    <!-- CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/app.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/custom.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='bundles/prism/prism.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='bundles/datatables/datatables.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='bundles/datatables/DataTables-1.10.16/css/dataTables.bootstrap4.min.css') }}"
    />
  </head>

  <body>
    <div class="loader"></div>
    <div id="app">
      <div class="main-wrapper main-wrapper-1">
        <div class="navbar-bg"></div>

        {% include 'partials/navbar.html' %} {% block sidebar %}{% endblock %}

        <div class="main-content">{% block content %}{% endblock %}</div>

        {% include 'partials/footer.html' %}
      </div>
    </div>

    <!-- MODALS BLOCK: All modals go here for proper z-index and backdrop rendering -->
    {% block modals %}{% endblock %}

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/app.min.js') }}"></script>
    <script src="{{ url_for('static', filename='bundles/apexcharts/apexcharts.min.js') }}"></script>
    <script src="{{ url_for('static', filename='bundles/prism/prism.js') }}"></script>
    <script src="{{ url_for('static', filename='js/page/index.js') }}"></script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/custom.js') }}"></script>
    <script src="{{ url_for('static', filename='js/page/datatables.js') }}"></script>
    <script src="{{ url_for('static', filename='bundles/jquery-ui/jquery-ui.min.js') }}"></script>
    <script src="{{ url_for('static', filename='bundles/datatables/DataTables-1.10.16/js/dataTables.bootstrap4.min.js') }}"></script>
    <script src="{{ url_for('static', filename='bundles/datatables/datatables.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/page/chart-apexcharts.js') }}"></script>
  </body>
</html>
